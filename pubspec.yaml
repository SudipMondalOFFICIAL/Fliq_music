name: filq
description: Filq - Watch & Earn
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_auth: ^5.3.1

  # Google Sign In
  google_sign_in: ^6.2.1

  # Local notifications
  flutter_local_notifications: ^17.1.2

  # Device info
  device_info_plus: ^10.1.0

  # Image
  image_picker: ^1.1.2

  # Share
  share_plus: ^10.1.4

  html: ^0.15.4

  # ── Video / Audio Player ──────────────────────────────────────
  # YouTube IFrame player — works reliably without stream extraction
  youtube_player_flutter: ^9.1.1

  # Audio playback + background play
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  audio_service: ^0.18.15

  # youtube_explode_dart kept for audio-only stream extraction
  youtube_explode_dart: ^2.3.0

  # Video playback (kept for non-YouTube local/direct URL videos)
  video_player: ^2.9.1
  chewie: ^1.8.5

  # Download / file management
  dio: ^5.7.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # Cached network image (thumbnails)
  cached_network_image: ^3.4.1

  # Animations
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true